# ================================================
# Ecommerce analytics pipeline configuration
# Scope: paths + database schema conventions
# NOTE: keep secrets in environment variables (.env), not here.
# ================================================

paths:
  env_file: ".env"
  data_dir: "data/"
  sql_dir: "sql/"
  outputs_dir: "outputs/"
  figures_dir: "outputs/figures/"

warehouse:
  raw_schema: "olist"        # fixed convention; SQL uses unquoted Olist.* (folds to olist in Postgres)
  analytics_schema: "analysis" # fixed convention; SQL assets write/read analysis.*
